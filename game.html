<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 栗噔噔 - 点击游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: #fff;
            overflow: hidden;
        }
        h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .score-board {
            font-size: 1.5rem;
            margin-bottom: 20px;
            padding: 10px 30px;
            background: rgba(255,255,255,0.1);
            border-radius: 25px;
            backdrop-filter: blur(10px);
        }
        .game-area {
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            position: relative;
            cursor: pointer;
            overflow: hidden;
            border: 2px solid rgba(255,255,255,0.1);
        }
        .target {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b6b, #ee5a24);
            border-radius: 50%;
            position: absolute;
            cursor: pointer;
            animation: pulse 0.5s ease-in-out infinite alternate;
            box-shadow: 0 0 20px rgba(255,107,107,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }
        @keyframes pulse {
            from { transform: scale(1); }
            to { transform: scale(1.1); }
        }
        .target::after {
            content: '🤖';
        }
        .click-effect {
            position: absolute;
            pointer-events: none;
            animation: flyUp 0.8s ease-out forwards;
            font-size: 1.5rem;
            font-weight: bold;
            color: #feca57;
        }
        @keyframes flyUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.5); }
        }
        .start-btn {
            margin-top: 30px;
            padding: 15px 50px;
            font-size: 1.2rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border: none;
            border-radius: 30px;
            color: white;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .start-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(102,126,234,0.4);
        }
        .game-over {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 20px;
        }
        .hidden {
            display: none !important;
        }
        .combo {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 1.2rem;
            padding: 10px 20px;
            background: linear-gradient(135deg, #feca57, #ff9f43);
            border-radius: 20px;
            animation: comboPop 0.3s ease;
        }
        @keyframes comboPop {
            0% { transform: scale(0.5); }
            100% { transform: scale(1); }
        }
    </style>
</head>
<body>
    <h1>🤖 栗噔噔点击游戏</h1>
    <div class="score-board">得分: <span id="score">0</span></div>
    <div class="game-area" id="gameArea">
        <div class="target" id="target" style="display: none;"></div>
        <div class="game-over hidden" id="gameOver">
            <h2 style="font-size: 2rem; margin-bottom: 20px;">🎮 游戏结束！</h2>
            <p style="font-size: 1.5rem; margin-bottom: 30px;">最终得分: <span id="finalScore">0</span></p>
            <button class="start-btn" onclick="startGame()">再来一局</button>
        </div>
    </div>
    <button class="start-btn" id="startBtn" onclick="startGame()">开始游戏</button>
    <script>
        let score = 0;
        let timeLeft = 30;
        let gameRunning = false;
        let timer;
        let combo = 0;
        const gameArea = document.getElementById('gameArea');
        const target = document.getElementById('target');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('finalScore');
        const gameOverScreen = document.getElementById('gameOver');
        const startBtn = document.getElementById('startBtn');

        function getRandomPosition() {
            const maxX = gameArea.clientWidth - 50;
            const maxY = gameArea.clientHeight - 50;
            return {
                x: Math.floor(Math.random() * maxX),
                y: Math.floor(Math.random() * maxY)
            };
        }

        function moveTarget() {
            const pos = getRandomPosition();
            target.style.left = pos.x + 'px';
            target.style.top = pos.y + 'px';
        }

        function createClickEffect(x, y) {
            const effect = document.createElement('div');
            effect.className = 'click-effect';
            effect.textContent = '+' + (1 + Math.floor(combo / 5));
            effect.style.left = x + 'px';
            effect.style.top = y + 'px';
            gameArea.appendChild(effect);
            setTimeout(() => effect.remove(), 800);
        }

        function showCombo() {
            if (combo > 0 && combo % 5 === 0) {
                const comboEl = document.createElement('div');
                comboEl.className = 'combo';
                comboEl.textContent = '🔥 ' + combo + ' 连击！';
                document.body.appendChild(comboEl);
                setTimeout(() => comboEl.remove(), 1500);
            }
        }

        target.addEventListener('click', (e) => {
            if (!gameRunning) return;
            score += 1 + Math.floor(combo / 5);
            combo++;
            scoreDisplay.textContent = score;
            moveTarget();
            createClickEffect(e.offsetX, e.offsetY);
            showCombo();
            
            // 速度越来越快
            if (score % 10 === 0) {
                clearInterval(timer);
                timer = setInterval(moveTarget, Math.max(500, 1000 - score * 10));
            }
        });

        gameArea.addEventListener('click', (e) => {
            if (e.target === gameArea && gameRunning) {
                combo = 0;
            }
        });

        function startGame() {
            score = 0;
            combo = 0;
            timeLeft = 30;
            gameRunning = true;
            scoreDisplay.textContent = '0';
            gameOverScreen.classList.add('hidden');
            startBtn.style.display = 'none';
            target.style.display = 'flex';
            moveTarget();
            
            timer = setInterval(moveTarget, 1000);
            
            const countdown = setInterval(() => {
                timeLeft--;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    endGame();
                }
            }, 1000);
        }

        function endGame() {
            gameRunning = false;
            clearInterval(timer);
            target.style.display = 'none';
            finalScoreDisplay.textContent = score;
            gameOverScreen.classList.remove('hidden');
            startBtn.style.display = 'block';
            startBtn.textContent = '再来一局';
        }
    </script>
